name: YunoHost Package Check

on:
  workflow_dispatch:
    inputs:
      dist:
        description: "Debian distribution"
        default: "bookworm"
        type: choice
        options:
          - bookworm
          - bullseye
      ynh_branch:
        description: "YunoHost branch"
        default: "stable"
        type: choice
        options:
          - stable
          - testing
          - unstable

jobs:
  package-check:
    name: Package Check
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install package_check if needed
        run: |
          if [ ! -d "$HOME/package_check" ]; then
            git clone https://github.com/YunoHost/package_check "$HOME/package_check"
          else
            cd "$HOME/package_check" && git pull
          fi

      - name: Run package_check
        env:
          DIST: ${{ inputs.dist }}
          YNH_BRANCH: ${{ inputs.ynh_branch }}
        run: |
          "$HOME/package_check/package_check.sh" \
            --dist "$DIST" \
            --ynh-branch "$YNH_BRANCH" \
            "$GITHUB_WORKSPACE"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-check-results
          path: |
            **/results.json
            **/summary.png
